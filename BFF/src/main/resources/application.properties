spring.application.name=BFF
server.port=8080

# PRODUCTOS
spring.cloud.gateway.routes[0].id=productos
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/productos/**

# SUSCRIPCIONES
spring.cloud.gateway.routes[1].id=suscripciones
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/suscripciones/**